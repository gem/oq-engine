[workflow]
description = "AreaSource demo workflow"
env.OQ_SAMPLE_SITES = 0.1

[Job]
ini = "job.ini"
[[success]]
func = "openquake.engine.postjobs.import_outputs"
out_types = ["hcurves", "hmaps-stats"]
[[success]]
func = "openquake.engine.postjobs.save_performance"
operations = ["computing mean_std", "get_poes", "total postclassical"]
