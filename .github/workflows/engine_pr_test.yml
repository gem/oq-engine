# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: engine tests

on:
  pull_request:

jobs:
  calculators:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        python-version: ["3.13"]
    env:
      GITHUB_HEAD_REF: ${{ github.head_ref }}
      FROM_FORK: ${{ github.event.pull_request.head.repo.fork }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python  ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ $FROM_FORK == "true" ]]; then
            python install.py devel --version=$GITHUB_HEAD_REF --from_fork
          else
            python install.py devel --version=$GITHUB_HEAD_REF
          fi
      - name: Calculators tests
        run: |
          set -e
          source ~/openquake/bin/activate
          pip install https://wheelhouse.openquake.org/v3/py/rtgmpy-1.0.1-py3-none-any.whl
          oq engine --upgrade-db
          pytest --doctest-modules -x --disable-warnings --color=yes --durations=10 openquake/calculators -k "not classical"

  hazardlib:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04]
        python-version: ["3.12"]
    env:
      GITHUB_HEAD_REF: ${{ github.head_ref }}
      FROM_FORK: ${{ github.event.pull_request.head.repo.fork }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python  ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ $FROM_FORK == "true" ]]; then
            python install.py devel --version=$GITHUB_HEAD_REF --from_fork
          else
            python install.py devel --version=$GITHUB_HEAD_REF
          fi
      - name: Hazardlib tests
        run: |
          set -e
          source ~/openquake/bin/activate
          pip install pyshp pytest flake8 ruff https://wheelhouse.openquake.org/v3/py/rtgmpy-1.0.1-py3-none-any.whl
          oq engine --upgrade-db
          ruff check openquake
          curl https://downloads.openquake.org/test_data/exposure.hdf5 -o openquake/qa_tests_data/mosaic/exposure.hdf5
          pytest -xs --doctest-modules --disable-warnings --color=yes --durations=8 openquake/{sep,hmtk,risklib,commonlib,baselib,hazardlib}
          pytest -xs --doctest-modules --disable-warnings --color=yes --durations=8 openquake/calculators -k classical
          pytest --doctest-modules doc/contributing/*.rst
        shell: bash

  server:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04]
        python-version: ["3.11"]
    env:
      GITHUB_HEAD_REF: ${{ github.head_ref }}
      FROM_FORK: ${{ github.event.pull_request.head.repo.fork }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python  ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ $FROM_FORK == "true" ]]; then
            python install.py devel --version=$GITHUB_HEAD_REF --from_fork
          else
            python install.py devel --version=$GITHUB_HEAD_REF
          fi
      - name: Server tests
        run: |
          source ~/openquake/bin/activate
          oq engine --upgrade-db
          pip install https://wheelhouse.openquake.org/v3/py/pytest_django-4.9.0-py3-none-any.whl
          pip install pytest-playwright
          playwright install
          curl https://downloads.openquake.org/test_data/exposure.hdf5 -o openquake/qa_tests_data/mosaic/exposure.hdf5
          OQ_APPLICATION_MODE=PUBLIC pytest -vx openquake/server/tests/test_public_mode.py
          OQ_APPLICATION_MODE=RESTRICTED pytest -vx openquake/server/tests/test_restricted_mode.py
          OQ_APPLICATION_MODE=READ_ONLY pytest -vx openquake/server/tests/test_read_only_mode.py
          OQ_APPLICATION_MODE=IMPACT pytest -vx openquake/server/tests/test_impact_mode.py
          OQ_APPLICATION_MODE=AELO pytest -vx openquake/server/tests/test_aelo_mode.py
          pytest -xs --doctest-modules --disable-warnings --color=yes --durations=8 openquake/{commands,engine,_unc}
          OQ_APPLICATION_MODE=AELO pytest \
            --browser chromium \
            --capture=no \
            --maxfail=1 \
            --tb=short \
            openquake/server/tests/test_aelo_mode_ui.py \
            --tracing retain-on-failure \
            --screenshot only-on-failure \
            --video retain-on-failure
          OQ_APPLICATION_MODE=RESTRICTED pytest \
            --browser chromium \
            --capture=no \
            --maxfail=1 \
            --tb=short \
            openquake/server/tests/test_restricted_mode_ui.py \
            --tracing retain-on-failure \
            --screenshot only-on-failure \
            --video retain-on-failure
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-aelo-python${{ matrix.python-version }}-{{ matrix.os }}
          path: test-results
          retention-days: 7
