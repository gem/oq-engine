name: Nightly Engine Demos on User mode
on:
  workflow_dispatch:
    inputs:
      git-ref:
        description: Git Ref
        default: master
        required: true
        type: string
      debug_enabled:
        type: boolean
        description: 'SSH Connection '
        required: false
        default: false
  schedule:
    - cron: "30 3,10 * * *"
  push:
    branches:
      - 'engine-3.25'

jobs:
  Run_demos_and_test_WebUI:
    name: OQ ${{ matrix.engine-ref }} Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        python-version: ["3.11", "3.12", "3.13"]
        # engine-ref values, if manual run do not use the matrix
        # engine-ref: ["master", "engine-3.25"]
        # engine-ref: ${{ fromJson(github.event_name == 'workflow_dispatch' && format('["{0}"]', inputs.git-ref) || '["master","engine-3.25"]') }}
        engine-ref: ${{ fromJson(github.event_name == 'workflow_dispatch' && format('["{0}"]', inputs.git-ref) || '["master"]') }}
    steps:
      - name: Set up Python  ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install OQ (${{ matrix.engine-ref }})
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        id: install_oq
        run: |
          set -x
          curl -L -O https://github.com/gem/oq-engine/raw/${{ matrix.engine-ref }}/install.py
          # Resolve engine-ref to an installable version
          python install.py user --version=${{ matrix.engine-ref }} --venv $HOME/gh-venv-${{ matrix.engine-ref }}
      - name: Setup debugging session
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 60
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.debug_enabled }}
      - name: Run demos
        run: |
          source $HOME/gh-venv-${{ matrix.engine-ref }}/bin/activate
          set -x
          oq engine --upgrade-db
          oq --version
          sleep 1
          # Run all demos
          # Resolve demos branch:
          # PyPI LTS installs do not correspond to a Git ref;
          # demos are taken from the matching engine-* branch.
          cd $HOME/gh-venv-${{ matrix.engine-ref }}
          curl -L -O https://raw.githubusercontent.com/gem/oq-engine/refs/heads/${{ matrix.engine-ref }}/bin/run-demos.sh
          oq_basedir=$(python -c "from openquake import baselib; print(baselib.__path__[0].rsplit('/', 2)[0])")
          qa_tests_data_dir=$oq_basedir/openquake/qa_tests_data
          bash -x ./run-demos.sh demos ${qa_tests_data_dir}
          deactivate
      - name: Test WebUI and run https calculation
        run: |
          source $HOME/gh-venv-${{ matrix.engine-ref }}/bin/activate
          set -x
          # Run a calcs using https
          oq engine --run https://downloads.openquake.org/jobs/risk_test.zip
          # START WEBUI
          oq webui start 127.0.0.1:8800 -s &
          echo "Waiting WEBUI up on port 8800...."
          while ! nc -z localhost 8800; do
            sleep 7 # wait for 1/10 of the second before check again
          done
          echo "Test WebUI with curl "
          sleep 1
          curl -v --fail -G http://127.0.0.1:8800/engine/1/outputs
          sleep 1
