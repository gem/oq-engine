[general]
description = Test MorikawaFujiwara2013 NE/SW NIED variants (Interface + IntraSlab)
calculation_mode = classical
random_seed = 1

[geometry]
sites_csv = site_model.csv

[logic_tree]
number_of_logic_tree_samples = 0

[erf]
rupture_mesh_spacing = 1.0
width_of_mfd_bin = 0.2
area_source_discretization = 10

[site_params]
reference_vs30_type = measured
reference_vs30_value = 800
reference_depth_to_1pt0km_per_sec = -999
reference_depth_to_2pt5km_per_sec = -999
reference_depth_to_1pt4km_per_sec = 81

[calculation]
source_model_logic_tree_file = sscLT.xml
gsim_logic_tree_file = gmcLT.xml
investigation_time = 1.0
intensity_measure_types_and_levels = {
    "PGA": logscale(0.001, 2.0, 10),
    "SA(0.5)": logscale(0.001, 2.0, 10),
    "SA(1.0)": logscale(0.001, 2.0, 10)}
truncation_level = 3
maximum_distance = 200.0
